<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Blogify</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Global styles */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;  /* This ensures the body takes full height */
        }

        header {
            background-color: #3b5998;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            flex-grow: 1;  /* This allows content to grow and push the footer down */
        }

        h1 {
            text-align: center;
            color: #333;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .contact-info {
            margin-bottom: 20px;
        }

        .contact-info p {
            font-size: 18px;
            color: #666;
        }

        .contact-info .bold {
            font-weight: bold;
            color: #333;
        }

        .social-media {
            text-align: left;
            margin-top: 30px;
        }

        .social-media a {
            display: block;  /* Ensures each link takes a new line */
            font-size: 20px;
            color: #3b5998;
            margin: 10px 0;  /* Vertical spacing between links */
            text-decoration: none;
        }

        .social-media a:hover {
            color: #365899;
        }

        /* Footer styles */
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            margin-top: auto;  /* This pushes the footer to the bottom of the page */
        }
    </style>
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>

    <div class="container">
        <h2>Get in Touch</h2>

        <div class="contact-info">
            <p><span class="bold">Address:</span> Krishna Colony</p>
            <p><span class="bold">Phone:</span> +919876543210</p>
            <p><span class="bold">Email:</span> contact@blogify.com</p>
        </div>

        <h3>Follow Us</h3>
        <div class="social-media">
            <a href="https://facebook.com" target="_blank">Facebook</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
            <a href="https://instagram.com" target="_blank">Instagram</a>
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Blogify. All Rights Reserved.</p>
    </footer>
</body>
</html>
